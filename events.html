<!DOCTYPE html>
<html>
<head>
    <title>Range Rats Events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            padding: 28px 18px;
            text-align: center;
            background: radial-gradient(circle at top, #333 0%, #111 60%, #050505 100%);
            border-bottom: 2px solid #d4a017;
        }

        header h1 {
            margin: 0;
            color: #f5d27a;
            font-size: 34px;
        }

        header p {
            color: #ccc;
            margin: 10px 0 0;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 22px;
        }

        .topButtons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .topButtons a {
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 13px;
            border-radius: 12px;
            background: linear-gradient(135deg, #d4a017, #8a5a00);
        }

        #status {
            text-align: center;
            color: #ccc;
            margin: 25px 0;
        }

        .eventsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 22px;
        }

        .eventCard {
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 14px 35px rgba(0,0,0,0.45);
        }

        .eventImage {
            width: 100%;
            height: 210px;
            object-fit: cover;
            display: block;
            background: #2a2a2a;
        }

        .noImage {
            width: 100%;
            height: 210px;
            background: linear-gradient(135deg, #2a2a2a, #111);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-weight: bold;
        }

        .eventBody {
            padding: 18px;
        }

        .eventDate {
            color: #f5d27a;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .eventTitle {
            font-size: 23px;
            margin: 0 0 10px;
        }

        .eventDescription {
            color: #ccc;
            line-height: 1.45;
            margin-bottom: 14px;
        }

        .eventInfo {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
        }

        .eventButton {
            display: block;
            margin-top: 16px;
            padding: 12px;
            text-align: center;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            background: linear-gradient(135deg, #0078d4, #004f8c);
        }

        footer {
            text-align: center;
            padding: 25px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>

<body>

<header>
    <h1>Range Rats Events</h1>
    <p>Upcoming events pulled from SharePoint</p>
</header>

<div class="container">

    <div class="topButtons">
        <a href="index.html">Home</a>
        <a href="rangebooker.html">Range Booker</a>
    </div>

    <div id="status">Loading events...</div>

    <div id="eventsGrid" class="eventsGrid"></div>

</div>

<footer>
    © 2026 Range Rats
</footer>

<script>
async function loadEvents() {
    const status = document.getElementById("status");
    const grid = document.getElementById("eventsGrid");

    try {
        const res = await fetch("/api/GetEvents");

        if (!res.ok) {
            throw new Error("API returned " + res.status);
        }

        const data = await res.json();
        const events = data.events || [];

        grid.innerHTML = "";

        if (events.length === 0) {
            status.innerText = "No events found.";
            return;
        }

        status.style.display = "none";

        events.forEach(eventItem => {
            const card = document.createElement("div");
            card.className = "eventCard";

            let imageHtml = "";

            if (eventItem.imageDataUrl) {
                imageHtml = `<img class="eventImage" src="${eventItem.imageDataUrl}" alt="${escapeHtml(eventItem.title)}">`;
            } else {
                imageHtml = `<div class="noImage">No Event Photo</div>`;
            }

            card.innerHTML = `
                ${imageHtml}

                <div class="eventBody">
                    <div class="eventDate">${escapeHtml(eventItem.eventDateText || "Date TBD")}</div>
                    <h2 class="eventTitle">${escapeHtml(eventItem.title || "Untitled Event")}</h2>

                    <div class="eventDescription">
                        ${escapeHtml(eventItem.description || "No description available.")}
                    </div>

                    <div class="eventInfo">
                        ${eventItem.time ? "Time: " + escapeHtml(eventItem.time) + "<br>" : ""}
                        ${eventItem.location ? "Location: " + escapeHtml(eventItem.location) + "<br>" : ""}
                        Event ID: ${escapeHtml(String(eventItem.id))}
                    </div>

                    <a class="eventButton" href="eventdetails.html?id=${encodeURIComponent(eventItem.id)}">
                        View Event
                    </a>
                </div>
            `;

            grid.appendChild(card);
        });

    } catch (err) {
        console.error("Error loading events:", err);
        status.innerText = "Could not load events.";
    }
}

function escapeHtml(value) {
    return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

loadEvents();
</script>

</body>
</html>
