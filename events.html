<!DOCTYPE html>
<html>
<head>
    <title>Range Rats Events</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            padding: 28px 18px;
            text-align: center;
            background: radial-gradient(circle at top, #333 0%, #111 60%, #050505 100%);
            border-bottom: 2px solid #d4a017;
        }

        header h1 {
            margin: 0;
            color: #f5d27a;
            font-size: 34px;
        }

        header p {
            color: #ccc;
            margin: 10px 0 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 22px;
        }

        .topButtons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .topButtons a {
            text-align: center;
            text-decoration: none;
            color: white;
            font-weight: bold;
            padding: 13px;
            border-radius: 12px;
            background: linear-gradient(135deg, #d4a017, #8a5a00);
        }

        #status {
            text-align: center;
            color: #ccc;
            margin: 25px 0;
        }

        .eventsList {
            display: grid;
            gap: 16px;
        }

        .eventRow {
            display: grid;
            grid-template-columns: 120px 1fr;
            gap: 16px;
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.35);
        }

        .eventThumb {
            width: 120px;
            height: 90px;
            object-fit: cover;
            border-radius: 12px;
            background: #2a2a2a;
        }

        .noImage {
            width: 120px;
            height: 90px;
            border-radius: 12px;
            background: linear-gradient(135deg, #2a2a2a, #111);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
        }

        .eventDate {
            color: #f5d27a;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .eventTitle {
            margin: 0 0 8px;
            font-size: 22px;
        }

        .eventDescription {
            color: #ccc;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .eventMeta {
            color: #999;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .eventButton {
            display: inline-block;
            padding: 10px 16px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            background: linear-gradient(135deg, #0078d4, #004f8c);
        }

        footer {
            text-align: center;
            padding: 25px;
            color: #777;
            font-size: 14px;
        }

        @media (max-width: 650px) {
            .eventRow {
                grid-template-columns: 1fr;
            }

            .eventThumb,
            .noImage {
                width: 100%;
                height: 190px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Range Rats Events</h1>
    <p>Select an event to view details and photos</p>
</header>

<div class="container">

    <div class="topButtons">
        <a href="index.html">Home</a>
        <a href="rangebooker.html">Range Booker</a>
    </div>

    <div id="status">Loading events...</div>

    <div id="eventsList" class="eventsList"></div>

</div>

<footer>
    © 2026 Range Rats
</footer>

<script>
async function loadEvents() {
    const status = document.getElementById("status");
    const list = document.getElementById("eventsList");

    try {
        const res = await fetch("/api/GetEvents");

        if (!res.ok) {
            throw new Error("API returned " + res.status);
        }

        const data = await res.json();
        const events = data.events || [];

        list.innerHTML = "";

        if (events.length === 0) {
            status.innerText = "No events found.";
            return;
        }

        status.style.display = "none";

        events.forEach(eventItem => {
            const row = document.createElement("div");
            row.className = "eventRow";

            const imageSource = eventItem.imageDataUrl || eventItem.imageUrl || "";

            let imageHtml = "";

            if (imageSource) {
                imageHtml = `
                    <img class="eventThumb"
                         src="${imageSource}"
                         alt="${escapeHtml(eventItem.title)}">
                `;
            } else {
                imageHtml = `<div class="noImage">No Photo</div>`;
            }

            row.innerHTML = `
                <div>
                    ${imageHtml}
                </div>

                <div>
                    <div class="eventDate">
                        ${escapeHtml(eventItem.eventDateText || "Date TBD")}
                    </div>

                    <h2 class="eventTitle">
                        ${escapeHtml(eventItem.title || "Untitled Event")}
                    </h2>

                    <div class="eventDescription">
                        ${escapeHtml(eventItem.description || "No description available.")}
                    </div>

                    <div class="eventMeta">
                        ${eventItem.createdByName ? "Created by: " + escapeHtml(eventItem.createdByName) + "<br>" : ""}
                        Event ID: ${escapeHtml(String(eventItem.id))}
                    </div>

                    <a class="eventButton" href="eventsview.html?id=${encodeURIComponent(eventItem.id)}">
                        View Event
                    </a>
                </div>
            `;

            list.appendChild(row);
        });

    } catch (err) {
        console.error("Error loading events:", err);
        status.innerText = "Could not load events.";
    }
}

function escapeHtml(value) {
    return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

loadEvents();
</script>

</body>
</html>
