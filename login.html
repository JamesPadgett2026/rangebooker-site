<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Login</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
      linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
      url("https://images.unsplash.com/photo-1548438294-1ad5d5f4f063?auto=format&fit=crop&w=1400&q=80")
      center/cover no-repeat;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 360px;
    box-shadow: 0 25px 60px rgba(0,0,0,.35);
    text-align: center;
  }

  .logo {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }

  button:hover {
    background: #1d4ed8;
  }

  button:disabled {
    background: #93c5fd;
    cursor: not-allowed;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    min-height: 20px;
  }

  .error { color: #b91c1c; }
  .success { color: #166534; }

  .footer {
    margin-top: 16px;
    font-size: 13px;
  }

  .footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: bold;
  }

  .footer a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="card">
  <div class="logo">🎯 RangeBooker</div>
  <div class="subtitle">Reserve your time at the range with ease</div>

  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />

  <button id="loginButton" onclick="login()">Login</button>

  <div id="msg" class="msg"></div>

  <div class="footer">
    New here? <a href="createaccount.html">Create an account</a>
  </div>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");
  const loginButton = document.getElementById("loginButton");

  msg.textContent = "";
  msg.className = "msg";

  if (!email || !password) {
    msg.textContent = "Please enter your email and password.";
    msg.className = "msg error";
    return;
  }

  msg.textContent = "Logging in...";
  loginButton.disabled = true;

  try {
    const res = await fetch("/api/LoginMember", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      const message = data.message || data.error || "Login failed";

      if (message.toLowerCase().includes("not been approved")) {
        msg.textContent = "Your account has not been approved yet. Please wait for admin approval.";
      } else {
        msg.textContent = message;
      }

      msg.className = "msg error";
      loginButton.disabled = false;
      return;
    }

    sessionStorage.setItem("rangebookerUser", JSON.stringify(data.user || data.member));

    msg.textContent = "Login successful!";
    msg.className = "msg success";

    setTimeout(() => {
      window.location.href = "memberhome.html";
    }, 500);

  } catch (err) {
    msg.textContent = "Server error. Please try again.";
    msg.className = "msg error";
    loginButton.disabled = false;
  }
}
</script>

</body>
</html>
