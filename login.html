<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Login</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
      linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
      url("https://images.unsplash.com/photo-1548438294-1ad5d5f4f063?auto=format&fit=crop&w=1400&q=80")
      center/cover no-repeat;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 14px;
    width: 360px;
    box-shadow: 0 25px 60px rgba(0,0,0,.35);
    text-align: center;
  }

  .logo {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6b7280;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #d1d5db;
    font-size: 15px;
  }

  .password-wrap {
    position: relative;
    width: 100%;
  }

  .password-wrap input {
    padding-right: 46px;
  }

  .eye-button {
    position: absolute;
    right: 8px;
    top: 0;
    width: 38px;
    height: 42px;
    padding: 0;
    background: transparent;
    color: #374151;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    font-weight: normal;
  }

  .eye-button:hover {
    background: #f3f4f6;
  }

  button.login-btn {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }

  button.login-btn:hover {
    background: #1d4ed8;
  }

  button.login-btn:disabled {
    background: #93c5fd;
    cursor: not-allowed;
  }

  .msg {
    margin-top: 10px;
    font-size: 14px;
    min-height: 20px;
  }

  .error { color: #b91c1c; }
  .success { color: #166534; }

  .footer {
    margin-top: 16px;
    font-size: 13px;
  }

  .footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: bold;
  }

  .footer a:hover {
    text-decoration: underline;
  }
</style>
</head>

<body>

<div class="card">
  <div class="logo">🎯 RangeBooker</div>
  <div class="subtitle">Reserve your time at the range with ease</div>

  <input id="email" placeholder="Email" autocomplete="email" />

  <div class="password-wrap">
    <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
    <button
      id="eyeButton"
      class="eye-button"
      type="button"
      title="Hold to show password"
      aria-label="Hold to show password"
    >👁</button>
  </div>

  <button id="loginButton" class="login-btn" onclick="login()">Login</button>

  <div id="msg" class="msg"></div>

  <div class="footer">
    New here? <a href="createaccount.html">Create an account</a>
  </div>
</div>

<script>
const passwordInput = document.getElementById("password");
const eyeButton = document.getElementById("eyeButton");

function showPassword() {
  passwordInput.type = "text";
}

function hidePassword() {
  passwordInput.type = "password";
}

eyeButton.addEventListener("mousedown", function (e) {
  if (e.button === 0) {
    showPassword();
  }
});

eyeButton.addEventListener("mouseup", hidePassword);
eyeButton.addEventListener("mouseleave", hidePassword);

eyeButton.addEventListener("touchstart", function (e) {
  e.preventDefault();
  showPassword();
});

eyeButton.addEventListener("touchend", hidePassword);
eyeButton.addEventListener("touchcancel", hidePassword);

async function login() {
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value;

  const msg = document.getElementById("msg");
  const loginButton = document.getElementById("loginButton");

  msg.textContent = "";
  msg.className = "msg";

  if (!email || !password) {
    msg.textContent = "Please enter your email and password.";
    msg.className = "msg error";
    return;
  }

  msg.textContent = "Logging in...";
  loginButton.disabled = true;

  try {
    const res = await fetch("/api/LoginMember", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    let data = {};

    try {
      data = await res.json();
    } catch {
      data = {};
    }

    if (!res.ok || !data.success) {
      const message = data.message || data.error || "Login failed";
      const lowerMessage = message.toLowerCase();

      if (
        lowerMessage.includes("membership") ||
        lowerMessage.includes("not approved") ||
        lowerMessage.includes("not been approved")
      ) {
        msg.textContent = "Your membership request has not been approved yet. Please wait for admin approval.";
      } else if (
        lowerMessage.includes("inactive") ||
        lowerMessage.includes("suspended") ||
        lowerMessage.includes("active")
      ) {
        msg.textContent = "Your account is inactive or suspended. Please contact an administrator.";
      } else {
        msg.textContent = message;
      }

      msg.className = "msg error";
      loginButton.disabled = false;
      return;
    }

    const user = data.user || data.member;

    if (!user) {
      msg.textContent = "Login succeeded, but no user data was returned.";
      msg.className = "msg error";
      loginButton.disabled = false;
      return;
    }

    sessionStorage.setItem("rangebookerUser", JSON.stringify(user));

    msg.textContent = "Login successful!";
    msg.className = "msg success";

    setTimeout(() => {
      window.location.href = "memberhome.html";
    }, 500);

  } catch (err) {
    msg.textContent = "Server error. Please try again.";
    msg.className = "msg error";
    loginButton.disabled = false;
  }
}
</script>

</body>
</html>
