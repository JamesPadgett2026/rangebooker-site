<!DOCTYPE html>
<html>
<head>
    <title>Range Rats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
            width: 90%;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #0078d4;
            color: white;
        }

        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>

<body>

<div class="container">

    <img id="splashImage" src="" alt="Loading...">

    <h2>Enter Password</h2>

    <input id="passwordBox" type="password" placeholder="Password">

    <button onclick="checkPassword()">Enter</button>

</div>

<script>

let correctPassword = "";

// Skip password if already logged in
if (sessionStorage.getItem("eventAccess") === "true") {
    window.location.href = "rangebooker.html";
}

async function loadPage() {
    try {
        const res = await fetch("/api/GetSplashPagePassword");
        const data = await res.json();

        // Save password
        correctPassword = data.password || "";

        // Handle SharePoint Image Column
        if (data.image) {
            let imageUrl = "";

            if (typeof data.image === "string") {
                imageUrl = data.image;
            } else if (data.image.serverRelativeUrl) {
                imageUrl = "https://tropicaltech.sharepoint.com" + data.image.serverRelativeUrl;
            } else if (data.image.fileName) {
                imageUrl = data.image.fileName;
            }

            document.getElementById("splashImage").src = imageUrl;
        }

    } catch (err) {
        console.error("Error loading splash data:", err);
    }
}

async function checkPassword() {
    const entered = document.getElementById("passwordBox").value.trim();

    if (entered === correctPassword) {
        sessionStorage.setItem("eventAccess", "true");
        window.location.href = "rangebooker.html";
    } else {
        alert("Incorrect password");
    }
}

loadPage();

</script>

</body>
</html>
