<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RangeBooker</title>
</head>
<body>

<h1>RangeBooker</h1>

<h2>Locations</h2>
<button onclick="loadLocations()">Load Locations</button>

<div id="status"></div>
<div id="locations"></div>

<script>
async function loadLocations() {
  const status = document.getElementById('status');
  const container = document.getElementById('locations');

  status.textContent = 'Loading...';
  container.innerHTML = '';

  try {
    const response = await fetch('/api/GetLocations');
    status.textContent = 'HTTP Status: ' + response.status;

    const data = await response.json();

    container.innerHTML = data.locations.map(location => `
      <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <strong>${location.name}</strong><br>
        Status: ${location.status}
      </div>
    `).join('');
  } catch (error) {
    status.textContent = 'Error';
    container.innerHTML = error.message;
  }
}
</script>

</body>
</html>
