<!DOCTYPE html>
<html>
<head>
    <title>RangeBooker</title>
</head>
<body>

<h1>Locations</h1>
<div id="locations">Loading...</div>

<script>
fetch("http://localhost:7071/api/GetLocations")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById("locations");
    container.innerHTML = "";

    data.forEach(loc => {
      const div = document.createElement("div");
      div.innerText = loc.name + " - " + loc.city;
      container.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById("locations").innerText = "Error loading data";
    console.error(err);
  });
</script>

</body>
</html>
