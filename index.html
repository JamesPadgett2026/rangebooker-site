<!DOCTYPE html>
<html>
<head>
    <title>Range Rats</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #111;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            margin-top: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #0078d4;
            color: white;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- Splash Image -->
    <img id="splashImage" src="" alt="Loading...">

    <!-- Login Section -->
    <div id="loginSection">
        <h2>Enter Password</h2>
        <input id="passwordBox" type="password" placeholder="Password">
        <button onclick="checkPassword()">Enter</button>
    </div>

    <!-- Protected Content -->
    <div id="contentSection" class="hidden">
        <h2>Welcome to Range Rats</h2>
        <p>This is your event page. Add photos and details here.</p>

        <button onclick="logout()">Logout</button>
    </div>

</div>

<script>

let correctPassword = "";

// Load data from API
async function loadPage() {
    try {
        const res = await fetch("/api/GetSplashPagePassword");
        const data = await res.json();

        correctPassword = data.password || "";

        // Handle SharePoint image
        if (data.image) {
            let imageUrl = "";

            if (typeof data.image === "string") {
                imageUrl = data.image;
            } else if (data.image.serverRelativeUrl) {
                imageUrl = "https://tropicaltech.sharepoint.com" + data.image.serverRelativeUrl;
            }

            document.getElementById("splashImage").src = imageUrl;
        }

        // If already logged in, unlock page
        if (sessionStorage.getItem("eventAccess") === "true") {
            showContent();
        }

    } catch (err) {
        console.error("Error loading page:", err);
    }
}

function checkPassword() {
    const entered = document.getElementById("passwordBox").value.trim();

    if (entered === correctPassword) {
        sessionStorage.setItem("eventAccess", "true");
        showContent();
    } else {
        alert("Incorrect password");
    }
}

function showContent() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("contentSection").classList.remove("hidden");
}

function logout() {
    sessionStorage.removeItem("eventAccess");
    location.reload();
}

loadPage();

</script>

</body>
</html>
