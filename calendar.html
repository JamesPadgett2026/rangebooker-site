<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RangeBooker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background:
        radial-gradient(circle at top, rgba(37, 99, 235, 0.20), transparent 30%),
        linear-gradient(135deg, #020617 0%, #111827 55%, #0f172a 100%);
      color: #e5e7eb;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 32px;
      color: #f8fafc;
    }

    .subtext {
      color: #cbd5e1;
    }

    .login-link,
    .nav-link,
    button {
      display: inline-block;
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.30);
    }

    .login-link:hover,
    .nav-link:hover,
    button:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }

    .cancel-btn {
      margin-top: 12px;
      background: #dc2626;
    }

    .cancel-btn:hover {
      background: #b91c1c;
    }

    .toolbar {
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #status {
      margin-bottom: 18px;
      font-weight: bold;
      color: #cbd5e1;
    }

    .legend {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .legend-item {
      background: rgba(30, 41, 59, 0.90);
      border-radius: 999px;
      padding: 7px 12px;
      border: 1px solid rgba(148, 163, 184, 0.20);
      backdrop-filter: blur(6px);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
    }

    .card-link {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .day-card {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(0,0,0,0.35);
      padding: 16px;
      border-left: 8px solid #475569;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
      border-right: 1px solid rgba(148, 163, 184, 0.12);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      min-height: 150px;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .day-card.available {
      border-left-color: #16a34a;
      cursor: pointer;
    }

    .day-card.available:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(0,0,0,0.45);
    }

    .day-card.requested {
      border-left-color: #d97706;
    }

    .day-card.confirmed {
      border-left-color: #2563eb;
    }

    .day-card.booked {
      border-left-color: #dc2626;
      opacity: 0.95;
    }

    .day-card.blocked {
      border-left-color: #6b7280;
      background: rgba(30, 41, 59, 0.75);
      opacity: 0.90;
    }

    .date-text {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #f8fafc;
    }

    .time-text {
      font-size: 15px;
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .badge.available {
      background: rgba(22, 163, 74, 0.18);
      color: #86efac;
    }

    .badge.booked {
      background: rgba(220, 38, 38, 0.18);
      color: #fca5a5;
    }

    .badge.requested {
      background: rgba(217, 119, 6, 0.18);
      color: #fdba74;
    }

    .badge.confirmed {
      background: rgba(37, 99, 235, 0.20);
      color: #93c5fd;
    }

    .badge.blocked {
      background: rgba(107, 114, 128, 0.20);
      color: #d1d5db;
    }

    .hint-text {
      margin-top: 8px;
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.5;
    }

    .empty-message {
      background: rgba(15, 23, 42, 0.95);
      padding: 20px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.35);
      border: 1px solid rgba(148, 163, 184, 0.15);
      color: #e5e7eb;
    }

    @media (max-width: 640px) {
      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .login-link {
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>RangeBooker</h1>
        <div id="welcomeText" class="subtext">Loading calendar...</div>
      </div>

      <a id="loginBtn" class="login-link" href="/login.html">Logout</a>
    </div>

    <div class="toolbar">
      <button onclick="loadCalendar()">Refresh Calendar</button>
      <a class="nav-link" href="/mystats.html">My Stats</a>
    </div>

    <div class="legend">
      <div class="legend-item">🟢 Available</div>
      <div class="legend-item">🟠 Requested by you</div>
      <div class="legend-item">🔵 Confirmed for you</div>
      <div class="legend-item">🔴 Booked</div>
      <div class="legend-item">⚪ Too close to another request</div>
    </div>

    <div id="status"></div>
    <div id="calendar" class="calendar-grid"></div>
  </div>

  <script>
    // KEEP YOUR EXISTING SCRIPT EXACTLY AS-IS
  </script>
</body>
</html>
