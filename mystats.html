<div class="card">
  <h2>My Requested Dates</h2>
  <div id="myRequestList">Loading...</div>
</div>

<script>
  const savedUser = sessionStorage.getItem("rangebookerUser");

  if (!savedUser) {
    window.location.href = "/login.html";
  }

  const user = JSON.parse(savedUser);

  const loggedInEmail = (user.email || "").toLowerCase();
  const loggedInName =
    ((user.firstName || "") + " " + (user.lastName || "")).trim().toLowerCase();

  async function loadMyRequests() {
    try {
      const res = await fetch("/api/GetPendingRequests");

      if (!res.ok) {
        throw new Error("Could not load pending requests.");
      }

      const requests = await res.json();

      const myRequests = requests
        .filter(item => {
          const requestEmail = (item.MemberEmailColSP || "").toLowerCase();
          const requestName = (item.MemberNameColSP || "").trim().toLowerCase();

          return requestEmail === loggedInEmail || requestName === loggedInName;
        })
        .sort((a, b) => {
          return new Date(a.DateRequestWasAdded) - new Date(b.DateRequestWasAdded);
        });

      const container = document.getElementById("myRequestList");

      if (myRequests.length === 0) {
        container.innerHTML = "<p>You do not have any pending date requests.</p>";
        return;
      }

      container.innerHTML = myRequests.map(item => `
        <div style="padding:12px 0; border-bottom:1px solid #e5e7eb;">
          <strong>${formatDateOnly(item.RequestedDateColSP || item.DateColSP || item.DateToFilterID || "")}</strong><br>
          <span>Status: ${item.StatusColSP || "Pending"}</span><br>
          <span>Requested: ${formatDateTime(item.DateRequestWasAdded)}</span>
        </div>
      `).join("");

    } catch (err) {
      console.error(err);
      document.getElementById("myRequestList").innerHTML =
        "<p>Error loading your requests.</p>";
    }
  }

  function formatDateOnly(value) {
    if (!value) return "";

    const d = new Date(value);

    if (isNaN(d)) {
      return value;
    }

    return d.toLocaleDateString("en-US", {
      month: "numeric",
      day: "numeric",
      year: "numeric"
    });
  }

  function formatDateTime(value) {
    if (!value) return "";

    const d = new Date(value);

    if (isNaN(d)) {
      return value;
    }

    return d.toLocaleString("en-US", {
      month: "numeric",
      day: "numeric",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit"
    });
  }

  loadMyRequests();
</script>
