<!DOCTYPE html>
<html>
<head>
    <title>Event Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top, #2a2108 0%, #111 35%, #050505 100%);
            color: white;
        }

        header {
            padding: 24px 15px;
            text-align: center;
            background: #000;
            border-bottom: 2px solid #d4a017;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        .container {
            max-width: 1050px;
            margin: auto;
            padding: 22px;
        }

        .backBtn {
            display: inline-block;
            margin-bottom: 18px;
            color: #f5d27a;
            text-decoration: none;
            font-weight: bold;
        }

        .eventCard {
            background: rgba(20, 20, 20, 0.96);
            border: 1px solid rgba(212, 160, 23, 0.35);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 18px 45px rgba(0,0,0,0.6);
        }

        .heroWrap {
            position: relative;
            background: #000;
            text-align: center;
            padding: 14px;
        }

        .mainImage {
            width: 100%;
            max-height: 360px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            border-radius: 12px;
        }

        .photoHint {
            position: absolute;
            bottom: 24px;
            right: 24px;
            background: rgba(0,0,0,0.75);
            color: #f5d27a;
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .details {
            padding: 24px;
        }

        .title {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .date {
            color: #f5d27a;
            font-size: 17px;
            margin-bottom: 14px;
            font-weight: bold;
        }

        .meta {
            color: #bbb;
            margin-bottom: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .description {
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 26px;
        }

        .sectionTitle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }

        .sectionTitle h3 {
            margin: 0;
            font-size: 22px;
        }

        .photoCount {
            color: #aaa;
            font-size: 14px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        .galleryItem {
            position: relative;
            overflow: hidden;
            border-radius: 14px;
            background: #000;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 8px 18px rgba(0,0,0,0.35);
            cursor: pointer;
        }

        .galleryItem img {
            width: 100%;
            height: 145px;
            object-fit: cover;
            display: block;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        .galleryItem:hover img {
            transform: scale(1.06);
            opacity: 0.85;
        }

        .galleryItem::after {
            content: "View";
            position: absolute;
            right: 10px;
            bottom: 10px;
            background: rgba(0,0,0,0.75);
            color: #f5d27a;
            font-size: 12px;
            font-weight: bold;
            padding: 6px 9px;
            border-radius: 999px;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .galleryItem:hover::after {
            opacity: 1;
        }

        .status {
            text-align: center;
            color: #ccc;
            margin-top: 40px;
        }

        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            inset: 0;
            background: rgba(0,0,0,0.95);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .lightbox.show {
            display: flex;
        }

        .lightbox img {
            max-width: 96vw;
            max-height: 86vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 0 35px rgba(0,0,0,0.9);
        }

        .closeBtn {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 46px;
            height: 46px;
            font-size: 18px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 999px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10001;
        }

        .navBtn {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            width: 74px;
            height: 44px;
            font-size: 15px;
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.35);
            border-radius: 999px;
            cursor: pointer;
            font-weight: bold;
            z-index: 10001;
        }

        .prevBtn {
            left: 18px;
        }

        .nextBtn {
            right: 18px;
        }

        .closeBtn:hover,
        .navBtn:hover {
            background: rgba(245,210,122,0.25);
            border-color: #f5d27a;
        }

        .imageNumber {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: #f5d27a;
            background: rgba(0,0,0,0.7);
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
        }

        @media (max-width: 650px) {
            .container {
                padding: 14px;
            }

            header h1 {
                font-size: 27px;
            }

            .title {
                font-size: 27px;
            }

            .details {
                padding: 18px;
            }

            .mainImage {
                max-height: 280px;
            }

            .gallery {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .galleryItem img {
                height: 120px;
            }

            .prevBtn {
                left: 8px;
            }

            .nextBtn {
                right: 8px;
            }

            .navBtn {
                width: 64px;
                height: 42px;
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

<header>
    <h1>Event Details</h1>
</header>

<div class="container">

    <a href="events.html" class="backBtn">Back to Events</a>

    <div id="status" class="status">Loading event...</div>

    <div id="content" style="display:none;">

        <div class="eventCard">

            <div class="heroWrap" id="heroWrap">
                <img id="mainImage" class="mainImage" alt="Event photo">
                <div class="photoHint" id="photoHint">Click photo to enlarge</div>
            </div>

            <div class="details">
                <div class="title" id="title"></div>
                <div class="date" id="date"></div>
                <div class="meta" id="meta"></div>
                <div class="description" id="description"></div>

                <div class="sectionTitle">
                    <h3>Photos</h3>
                    <div class="photoCount" id="photoCount"></div>
                </div>

                <div class="gallery" id="gallery"></div>
            </div>

        </div>

    </div>

</div>

<div class="lightbox" id="lightbox">
    <button class="closeBtn" type="button" id="closeBtn">X</button>
    <button class="navBtn prevBtn" type="button" id="prevBtn">Prev</button>
    <img id="lightboxImage" alt="Enlarged event photo">
    <button class="navBtn nextBtn" type="button" id="nextBtn">Next</button>
    <div class="imageNumber" id="imageNumber"></div>
</div>

<script>
let allImages = [];
let currentImageIndex = 0;

function getIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

function updateLightboxImage() {
    if (!allImages || allImages.length === 0) return;

    document.getElementById("lightboxImage").src = allImages[currentImageIndex];
    document.getElementById("imageNumber").innerText =
        (currentImageIndex + 1) + " of " + allImages.length;
}

function openLightbox(index) {
    if (!allImages || allImages.length === 0) return;

    currentImageIndex = index;
    updateLightboxImage();

    document.getElementById("lightbox").classList.add("show");
}

function closeLightbox() {
    document.getElementById("lightbox").classList.remove("show");
}

function changePhoto(direction) {
    if (!allImages || allImages.length === 0) return;

    currentImageIndex = currentImageIndex + direction;

    if (currentImageIndex < 0) {
        currentImageIndex = allImages.length - 1;
    }

    if (currentImageIndex >= allImages.length) {
        currentImageIndex = 0;
    }

    updateLightboxImage();
}

document.getElementById("closeBtn").addEventListener("click", function(e) {
    e.stopPropagation();
    closeLightbox();
});

document.getElementById("prevBtn").addEventListener("click", function(e) {
    e.stopPropagation();
    changePhoto(-1);
});

document.getElementById("nextBtn").addEventListener("click", function(e) {
    e.stopPropagation();
    changePhoto(1);
});

document.getElementById("lightbox").addEventListener("click", function(e) {
    if (e.target.id === "lightbox") {
        closeLightbox();
    }
});

document.addEventListener("keydown", function(e) {
    const lightboxOpen = document.getElementById("lightbox").classList.contains("show");

    if (!lightboxOpen) return;

    if (e.key === "Escape") {
        closeLightbox();
    }

    if (e.key === "ArrowLeft") {
        changePhoto(-1);
    }

    if (e.key === "ArrowRight") {
        changePhoto(1);
    }
});

async function loadEvent() {
    const id = getIdFromUrl();
    const status = document.getElementById("status");

    if (!id) {
        status.innerText = "No event ID provided.";
        return;
    }

    try {
        const res = await fetch("/api/GetEvents");
        const data = await res.json();
        const events = data.events || [];

        const event = events.find(e => String(e.id) === String(id));

        if (!event) {
            status.innerText = "Event not found.";
            return;
        }

        status.style.display = "none";
        document.getElementById("content").style.display = "block";

        allImages = [];

        if (event.images && event.images.length > 0) {
            allImages = event.images;
        } else if (event.imageDataUrl) {
            allImages = [event.imageDataUrl];
        }

        const mainImageEl = document.getElementById("mainImage");
        const heroWrap = document.getElementById("heroWrap");
        const photoHint = document.getElementById("photoHint");

        if (allImages.length > 0) {
            mainImageEl.src = allImages[0];
            heroWrap.style.display = "block";
            photoHint.style.display = "block";

            mainImageEl.onclick = function () {
                openLightbox(0);
            };
        } else {
            heroWrap.style.display = "none";
            photoHint.style.display = "none";
        }

        document.getElementById("title").innerText = event.title || "Untitled Event";
        document.getElementById("date").innerText = event.eventDateText || "";
        document.getElementById("description").innerText = event.description || "";

        document.getElementById("meta").innerHTML =
            (event.createdByName ? "Created by: " + event.createdByName + "<br>" : "") +
            (event.createdDateText ? "Created: " + event.createdDateText : "");

        const gallery = document.getElementById("gallery");
        const photoCount = document.getElementById("photoCount");

        gallery.innerHTML = "";

        if (allImages.length === 1) {
            photoCount.innerText = "1 photo";
        } else {
            photoCount.innerText = allImages.length + " photos";
        }

        if (allImages.length > 0) {
            allImages.forEach(function(src, index) {
                const item = document.createElement("div");
                item.className = "galleryItem";

                const img = document.createElement("img");
                img.src = src;
                img.alt = "Event photo " + (index + 1);

                item.onclick = function () {
                    openLightbox(index);
                };

                item.appendChild(img);
                gallery.appendChild(item);
            });
        } else {
            gallery.innerHTML = "<div class='status'>No photos found for this event.</div>";
            photoCount.innerText = "0 photos";
        }

    } catch (err) {
        console.error(err);
        status.innerText = "Error loading event.";
    }
}

loadEvent();
</script>

</body>
</html>
