<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 32%),
      linear-gradient(135deg, #020617 0%, #111827 55%, #0f172a 100%);
    color: #e5e7eb;
    min-height: 100vh;
  }

  .header {
    background: rgba(15, 23, 42, 0.96);
    color: white;
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid rgba(148, 163, 184, 0.16);
  }

  .header h1 {
    margin: 0;
    font-size: 32px;
    color: #f8fafc;
  }

  .header p {
    margin-top: 8px;
    color: #cbd5e1;
  }

  .top-buttons {
    display: flex;
    gap: 10px;
    padding: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .nav-button {
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    font-size: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  }

  .nav-button:hover {
    background: #1d4ed8;
  }

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 16px;
  }

  .featured-banner {
    background: linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(30, 58, 138, 0.88));
    color: white;
    border-radius: 18px;
    padding: 28px;
    margin-bottom: 28px;
    text-align: center;
    border: 1px solid rgba(148, 163, 184, 0.16);
    box-shadow: 0 10px 26px rgba(0,0,0,0.36);
  }

  .featured-banner h2 {
    margin-top: 0;
    font-size: 34px;
    color: #f8fafc;
  }

  .featured-banner p {
    color: #cbd5e1;
    max-width: 700px;
    margin: auto;
    line-height: 1.6;
  }

  .section-title {
    font-size: 28px;
    margin-bottom: 20px;
    text-align: center;
    color: #f8fafc;
  }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
  }

  .post-card {
    background: rgba(15, 23, 42, 0.96);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 26px rgba(0,0,0,0.36);
    border: 1px solid rgba(148, 163, 184, 0.14);
  }

  .post-content {
    padding: 18px;
  }

  .post-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #f8fafc;
  }

  .post-date {
    display: inline-block;
    background: rgba(37, 99, 235, 0.20);
    color: #93c5fd;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 12px;
  }

  .post-photos {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin: 12px 0 16px 0;
  }

  .post-photo-wrap {
    background: rgba(30, 41, 59, 0.82);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(148, 163, 184, 0.12);
  }

  .post-photo {
    width: 100%;
    height: 180px;
    object-fit: contain;
    display: block;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .post-photo:hover {
    transform: scale(1.03);
  }

  .photo-title {
    font-size: 12px;
    color: #cbd5e1;
    padding: 8px;
    text-align: center;
  }

  .post-text {
    color: #cbd5e1;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 14px;
  }

  .post-text a {
    color: #93c5fd;
    font-weight: bold;
  }

  .post-footer {
    font-size: 13px;
    color: #94a3b8;
    border-top: 1px solid rgba(148, 163, 184, 0.16);
    padding-top: 12px;
  }

  .message {
    text-align: center;
    color: #cbd5e1;
    padding: 30px;
    font-size: 18px;
  }

  .error-box {
    max-width: 900px;
    margin: 20px auto;
    background: rgba(127, 29, 29, 0.55);
    color: #fecaca;
    border: 1px solid rgba(248, 113, 113, 0.35);
    border-radius: 14px;
    padding: 18px;
    text-align: left;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .error-box strong {
    display: block;
    margin-bottom: 8px;
    font-size: 18px;
    color: #fee2e2;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #334155;
    border-top: 4px solid #60a5fa;
    border-radius: 50%;
    margin: 0 auto 12px auto;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .photo-modal {
    display: none;
    position: fixed;
    z-index: 99999;
    inset: 0;
    background: rgba(0,0,0,0.92);
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .photo-modal img {
    max-width: 95%;
    max-height: 90vh;
    border-radius: 12px;
    background: #0f172a;
  }

  .photo-close {
    position: fixed;
    top: 18px;
    right: 28px;
    font-size: 42px;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  .footer {
    text-align: center;
    padding: 30px;
    color: #94a3b8;
    font-size: 14px;
  }

  @media (max-width: 700px) {
    .header h1 {
      font-size: 26px;
    }

    .featured-banner h2 {
      font-size: 28px;
    }

    .board-grid {
      grid-template-columns: 1fr;
    }

    .post-photo {
      height: 220px;
    }
  }
</style>
