<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RangeBooker Test - Create Account</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      min-height: 100vh;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 920px;
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.28);
    }

    .left {
      padding: 42px;
      background:
        linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.85)),
        url("https://images.unsplash.com/photo-1511884642898-4c92249e20b6?auto=format&fit=crop&w=1200&q=80") center/cover;
      color: white;
    }

    .left h1 {
      margin: 0 0 12px;
      font-size: 36px;
    }

    .left p {
      line-height: 1.5;
    }

    .right {
      padding: 32px;
      background: #f8fafc;
    }

    form {
      display: grid;
      gap: 14px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    .btn {
      background: #2563eb;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .message {
      display: none;
      padding: 12px;
      border-radius: 10px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .message.info {
      display: block;
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    @media (max-width: 860px) {
      .card { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">

      <div class="left">
        <h1>Join RangeBooker</h1>
        <p>Create your account to access bookings and member tools.</p>
      </div>

      <div class="right">
        <h2>Create Account</h2>

        <form id="createAccountForm">
          <div class="row">
            <input id="firstName" placeholder="First Name" required />
            <input id="lastName" placeholder="Last Name" required />
          </div>

          <input id="email" type="email" placeholder="Email" required />
          <input id="phone" placeholder="Phone (optional)" />
          <input id="password" type="password" placeholder="Password" required />

          <textarea id="notes" placeholder="Notes (optional)"></textarea>

          <button id="submitButton" class="btn" type="submit">Create Account</button>

          <div id="message" class="message"></div>
        </form>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById("createAccountForm");
    const message = document.getElementById("message");
    const btn = document.getElementById("submitButton");

    function showMessage(text, type) {
      message.textContent = text;
      message.className = "message " + type;
    }

    function onlyDigits(value) {
      return String(value || "").replace(/\D/g, "");
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const payload = {
        firstName: document.getElementById("firstName").value.trim(),
        lastName: document.getElementById("lastName").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: onlyDigits(document.getElementById("phone").value),
        password: document.getElementById("password").value,
        notes: document.getElementById("notes").value.trim()
      };

      btn.disabled = true;
      btn.textContent = "Creating...";
      showMessage("Sending request...", "info");

      try {
        const response = await fetch("/api/RegisterMember", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          let errorText = "Could not create account.";

          try {
            const errorData = await response.json();
            errorText = errorData.error || JSON.stringify(errorData, null, 2);
          } catch (jsonErr) {
            errorText = await response.text();
          }

          showMessage(errorText, "error");
          return;
        }

        let data = {};
        try {
          data = await response.json();
        } catch (jsonErr) {
          data = {};
        }

        showMessage(data.message || "Account created!", "success");
        form.reset();

      } catch (err) {
        showMessage("Server not reachable: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Create Account";
      }
    });
  </script>
</body>
</html>
