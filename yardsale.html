<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yard Sale Items</title>

  <style>
    :root {
      --bg: #12100d;
      --panel: #1d1914;
      --card: #241f19;
      --card2: #2d261e;
      --text: #f7efe3;
      --muted: #c9bca9;
      --gold: #d6a85f;
      --green: #63d98b;
      --border: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(214,168,95,0.14), transparent 34%),
        linear-gradient(180deg, #18140f 0%, var(--bg) 100%);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    header {
      background: rgba(20, 15, 10, 0.94);
      border-bottom: 1px solid var(--border);
      padding: 22px 18px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      max-width: 1200px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title-block h1 {
      margin: 0;
      font-size: 38px;
      letter-spacing: 0.5px;
    }

    .title-block p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1b130b;
      background: var(--gold);
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 8px 20px rgba(0,0,0,0.28);
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    .back-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.08);
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 26px 18px 42px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 24px;
    }

    .item-card {
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 34px var(--shadow);
    }

    .photo-wrap {
      width: 100%;
      height: 260px;
      background: #0d0b09;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111;
    }

    .no-photo {
      font-size: 20px;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 24px;
    }

    .item-body {
      padding: 18px;
    }

    .item-body h2 {
      margin: 0 0 10px;
      font-size: 24px;
      color: var(--text);
    }

    .price {
      color: var(--green);
      font-size: 29px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .description {
      color: var(--muted);
      line-height: 1.5;
      min-height: 48px;
      margin: 0;
      white-space: pre-wrap;
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .details span {
      background: rgba(214,168,95,0.16);
      border: 1px solid rgba(214,168,95,0.28);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      color: #f2d39d;
    }

    .empty, .loading, .error {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 20px;
      text-align: center;
      font-size: 21px;
      box-shadow: 0 14px 34px var(--shadow);
      color: var(--text);
    }

    .error {
      color: #ffb4a8;
    }

    @media (max-width: 600px) {
      .header-inner {
        justify-content: center;
        text-align: center;
      }

      .title-block h1 {
        font-size: 32px;
      }

      .back-button {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <div class="title-block">
      <h1>Yard Sale Items</h1>
      <p id="itemCount">Loading open items...</p>
    </div>

    <a class="back-button" href="memberhome.html">← Back to Member Home</a>
  </div>
</header>

<div class="container">
  <div id="itemsGrid" class="grid">
    <div class="loading">Loading yard sale items...</div>
  </div>
</div>

<script>
  const API_URL = "/api/GetYardSaleItems";

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatPrice(value) {
    if (value === null || value === undefined || value === "") {
      return "Price not listed";
    }

    const n = Number(value);

    if (Number.isNaN(n)) {
      return escapeHtml(value);
    }

    return "$" + n.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  async function loadYardSaleItems() {
    const grid = document.getElementById("itemsGrid");
    const itemCount = document.getElementById("itemCount");

    try {
      const response = await fetch(API_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("API returned status " + response.status);
      }

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.error || "API returned success false.");
      }

      const items = Array.isArray(data.items) ? data.items : [];

      itemCount.textContent =
        items.length + " open item" + (items.length === 1 ? "" : "s") + " available";

      if (items.length === 0) {
        grid.innerHTML = `<div class="empty">No open yard sale items found.</div>`;
        return;
      }

      grid.innerHTML = items.map(item => {
        const name = escapeHtml(item.itemName || item.title || "Untitled Item");
        const description = escapeHtml(item.description || "No description listed.");
        const condition = escapeHtml(item.condition || "Unknown Condition");
        const saleType = escapeHtml(item.saleType || "Unknown Sale Type");
        const price = formatPrice(item.askingPrice);
        const image = item.imageDataUrl || "";

        return `
          <div class="item-card">
            <div class="photo-wrap">
              ${
                image
                  ? `<img src="${image}" alt="${name}">`
                  : `<div class="no-photo">No Photo</div>`
              }
            </div>

            <div class="item-body">
              <h2>${name}</h2>
              <div class="price">${price}</div>
              <p class="description">${description}</p>

              <div class="details">
                <span>${condition}</span>
                <span>${saleType}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");

    } catch (err) {
      console.error(err);

      itemCount.textContent = "Could not load yard sale items.";

      grid.innerHTML = `
        <div class="error">
          Could not load yard sale items.<br><br>
          ${escapeHtml(err.message)}
        </div>
      `;
    }
  }

  loadYardSaleItems();
</script>

</body>
</html>
