<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yard Sale Items</title>

  <style>
    :root {
      --bg: #12100d;
      --panel: #1d1914;
      --card: #241f19;
      --card2: #2d261e;
      --text: #f7efe3;
      --muted: #c9bca9;
      --gold: #d6a85f;
      --green: #63d98b;
      --border: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.45);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(214,168,95,0.14), transparent 34%),
        linear-gradient(180deg, #18140f 0%, var(--bg) 100%);
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    header {
      background: rgba(20, 15, 10, 0.94);
      border-bottom: 1px solid var(--border);
      padding: 18px;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      max-width: 1200px;
      margin: auto;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 16px;
    }

    .title-block {
      text-align: center;
    }

    .title-block h1 {
      margin: 0;
      font-size: 36px;
    }

    .title-block p {
      margin: 7px 0 0;
      color: var(--muted);
    }

    .back-button,
    .close-button {
      color: #1b130b;
      background: var(--gold);
      padding: 11px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: bold;
      border: 0;
      cursor: pointer;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 26px 18px 42px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(285px, 1fr));
      gap: 24px;
    }

    .item-card {
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 14px 34px var(--shadow);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .item-card:hover {
      transform: translateY(-3px);
      border-color: rgba(214,168,95,0.45);
    }

    .photo-wrap {
      width: 100%;
      height: 260px;
      background: #0d0b09;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #111;
    }

    .no-photo {
      font-size: 20px;
      color: var(--muted);
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 24px;
    }

    .item-body {
      padding: 18px;
    }

    .item-body h2 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    .price {
      color: var(--green);
      font-size: 29px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .description {
      color: var(--muted);
      line-height: 1.5;
      min-height: 48px;
      margin: 0;
      white-space: pre-wrap;
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .details span {
      background: rgba(214,168,95,0.16);
      border: 1px solid rgba(214,168,95,0.28);
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      color: #f2d39d;
    }

    .empty, .loading, .error {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 20px;
      text-align: center;
      font-size: 21px;
      box-shadow: 0 14px 34px var(--shadow);
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 20;
      padding: 18px;
      overflow-y: auto;
    }

    .modal-backdrop.open {
      display: block;
    }

    .modal-card {
      max-width: 920px;
      margin: 30px auto;
      background: linear-gradient(180deg, #2d261e, #18140f);
      border: 1px solid rgba(214,168,95,0.35);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.65);
      overflow: hidden;
    }

    .modal-photo {
      width: 100%;
      max-height: 520px;
      background: #080706;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .modal-photo img {
      width: 100%;
      max-height: 520px;
      object-fit: contain;
    }

    .modal-body {
      padding: 24px;
    }

    .modal-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .modal-body h2 {
      margin: 0;
      font-size: 34px;
    }

    .modal-description {
      color: var(--muted);
      line-height: 1.6;
      white-space: pre-wrap;
      margin-top: 18px;
      font-size: 17px;
    }

    .detail-table {
      margin-top: 20px;
      border-top: 1px solid var(--border);
    }

    .detail-row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .detail-label {
      color: #f2d39d;
      font-weight: bold;
    }

    .detail-value {
      color: var(--text);
    }

    @media (max-width: 700px) {
      .header-inner {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .back-button {
        justify-self: start;
      }

      .title-block h1 {
        font-size: 31px;
      }

      .modal-top {
        flex-direction: column;
      }

      .detail-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <a class="back-button" href="memberhome.html">← Back</a>

    <div class="title-block">
      <h1>Yard Sale Items</h1>
      <p id="itemCount">Loading open items...</p>
    </div>

    <div></div>
  </div>
</header>

<div class="container">
  <div id="itemsGrid" class="grid">
    <div class="loading">Loading yard sale items...</div>
  </div>
</div>

<div id="itemModal" class="modal-backdrop">
  <div class="modal-card">
    <div id="modalPhoto" class="modal-photo"></div>

    <div class="modal-body">
      <div class="modal-top">
        <div>
          <h2 id="modalTitle"></h2>
          <div id="modalPrice" class="price"></div>
        </div>

        <button class="close-button" onclick="closeItemModal()">Close</button>
      </div>

      <div id="modalDescription" class="modal-description"></div>

      <div class="detail-table">
        <div class="detail-row">
          <div class="detail-label">Condition</div>
          <div id="modalCondition" class="detail-value"></div>
        </div>

        <div class="detail-row">
          <div class="detail-label">Sale Type</div>
          <div id="modalSaleType" class="detail-value"></div>
        </div>

        <div class="detail-row">
          <div class="detail-label">Status</div>
          <div id="modalStatus" class="detail-value"></div>
        </div>

        <div class="detail-row">
          <div class="detail-label">Date Added</div>
          <div id="modalDateAdded" class="detail-value"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API_URL = "/api/GetYardSaleItems";
  let yardSaleItems = [];

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatPrice(value) {
    if (value === null || value === undefined || value === "") {
      return "Price not listed";
    }

    const n = Number(value);

    if (Number.isNaN(n)) {
      return escapeHtml(value);
    }

    return "$" + n.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function formatDate(value) {
    if (!value) return "Not listed";

    const d = new Date(value);

    if (Number.isNaN(d.getTime())) {
      return escapeHtml(value);
    }

    return d.toLocaleDateString("en-US", {
      year: "numeric",
      month: "long",
      day: "numeric"
    });
  }

  async function loadYardSaleItems() {
    const grid = document.getElementById("itemsGrid");
    const itemCount = document.getElementById("itemCount");

    try {
      const response = await fetch(API_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("API returned status " + response.status);
      }

      const data = await response.json();

      if (!data.success) {
        throw new Error(data.error || "API returned success false.");
      }

      yardSaleItems = Array.isArray(data.items) ? data.items : [];

      itemCount.textContent =
        yardSaleItems.length + " open item" + (yardSaleItems.length === 1 ? "" : "s") + " available";

      if (yardSaleItems.length === 0) {
        grid.innerHTML = `<div class="empty">No open yard sale items found.</div>`;
        return;
      }

      grid.innerHTML = yardSaleItems.map((item, index) => {
        const name = escapeHtml(item.itemName || item.title || "Untitled Item");
        const description = escapeHtml(item.description || "No description listed.");
        const condition = escapeHtml(item.condition || "Unknown Condition");
        const saleType = escapeHtml(item.saleType || "Unknown Sale Type");
        const price = formatPrice(item.askingPrice);
        const image = item.imageDataUrl || "";

        return `
          <div class="item-card" onclick="openItemModal(${index})">
            <div class="photo-wrap">
              ${
                image
                  ? `<img src="${image}" alt="${name}">`
                  : `<div class="no-photo">No Photo</div>`
              }
            </div>

            <div class="item-body">
              <h2>${name}</h2>
              <div class="price">${price}</div>
              <p class="description">${description}</p>

              <div class="details">
                <span>${condition}</span>
                <span>${saleType}</span>
              </div>
            </div>
          </div>
        `;
      }).join("");

    } catch (err) {
      console.error(err);

      itemCount.textContent = "Could not load yard sale items.";

      grid.innerHTML = `
        <div class="error">
          Could not load yard sale items.<br><br>
          ${escapeHtml(err.message)}
        </div>
      `;
    }
  }

  function openItemModal(index) {
    const item = yardSaleItems[index];

    if (!item) return;

    const name = escapeHtml(item.itemName || item.title || "Untitled Item");
    const image = item.imageDataUrl || "";

    document.getElementById("modalTitle").innerHTML = name;
    document.getElementById("modalPrice").innerHTML = formatPrice(item.askingPrice);
    document.getElementById("modalDescription").innerHTML =
      escapeHtml(item.description || "No description listed.");

    document.getElementById("modalCondition").innerHTML =
      escapeHtml(item.condition || "Unknown Condition");

    document.getElementById("modalSaleType").innerHTML =
      escapeHtml(item.saleType || "Unknown Sale Type");

    document.getElementById("modalStatus").innerHTML =
      escapeHtml(item.saleOpenClosed || "Open");

    document.getElementById("modalDateAdded").innerHTML =
      formatDate(item.dateAdded);

    document.getElementById("modalPhoto").innerHTML = image
      ? `<img src="${image}" alt="${name}">`
      : `<div class="no-photo">No Photo</div>`;

    document.getElementById("itemModal").classList.add("open");
  }

  function closeItemModal() {
    document.getElementById("itemModal").classList.remove("open");
  }

  document.getElementById("itemModal").addEventListener("click", function(event) {
    if (event.target.id === "itemModal") {
      closeItemModal();
    }
  });

  document.addEventListener("keydown", function(event) {
    if (event.key === "Escape") {
      closeItemModal();
    }
  });

  loadYardSaleItems();
</script>

</body>
</html>
