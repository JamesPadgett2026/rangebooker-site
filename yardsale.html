<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>RangeBooker - Yard Sale</title>

<style>

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(37, 99, 235, 0.18), transparent 35%),
      linear-gradient(135deg, #020617 0%, #111827 55%, #0f172a 100%);
    color: white;
    min-height: 100vh;
  }

  .wrap {
    max-width: 1250px;
    margin: 0 auto;
    padding: 28px 18px 40px;
  }

  .hero {
    background: rgba(15, 23, 42, 0.92);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 26px;
    padding: 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.45);
    margin-bottom: 28px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
  }

  .brand {
    display: inline-block;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(37, 99, 235, 0.18);
    color: #93c5fd;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border: 1px solid rgba(147, 197, 253, 0.22);
    margin-bottom: 14px;
  }

  h1 {
    margin: 0 0 10px;
    font-size: 42px;
    color: #f8fafc;
  }

  .sub {
    color: #cbd5e1;
    font-size: 17px;
    line-height: 1.6;
    max-width: 760px;
  }

  .backButton {
    text-decoration: none;
    color: white;
    background: rgba(148, 163, 184, 0.16);
    border: 1px solid rgba(148, 163, 184, 0.22);
    padding: 12px 18px;
    border-radius: 14px;
    font-weight: bold;
    transition: 0.15s ease;
    white-space: nowrap;
  }

  .backButton:hover {
    transform: translateY(-2px);
    background: rgba(148, 163, 184, 0.24);
  }

  #statusBox {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 22px;
    color: #cbd5e1;
    margin-bottom: 24px;
    text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 22px;
  }

  .itemCard {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    overflow: hidden;
    box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    transition: transform 0.15s ease;
  }

  .itemCard:hover {
    transform: translateY(-4px);
  }

  .photoWrap {
    width: 100%;
    height: 240px;
    background: linear-gradient(135deg, #1e293b, #475569);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cbd5e1;
    font-weight: bold;
  }

  .photoWrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cardBody {
    padding: 20px;
  }

  .itemTitle {
    font-size: 24px;
    font-weight: bold;
    color: #f8fafc;
    margin-bottom: 10px;
  }

  .price {
    color: #facc15;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 14px;
  }

  .description {
    color: #dbeafe;
    line-height: 1.6;
    min-height: 70px;
    margin-bottom: 16px;
  }

  .meta {
    color: #94a3b8;
    font-size: 14px;
    line-height: 1.7;
    margin-bottom: 18px;
  }

  .bidButton {
    width: 100%;
    border: none;
    border-radius: 14px;
    padding: 15px;
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.15s ease;
  }

  .bidButton:hover {
    filter: brightness(1.12);
  }

  .footerNote {
    margin-top: 36px;
    text-align: center;
    color: #64748b;
    font-size: 14px;
  }

  @media (max-width: 760px) {

    .topbar {
      flex-direction: column;
      align-items: flex-start;
    }

    h1 {
      font-size: 32px;
    }

    .sub {
      font-size: 16px;
    }

    .hero {
      padding: 22px;
    }
  }

</style>
</head>

<body>

<div class="wrap">

  <div class="hero">

    <div class="topbar">

      <div>

        <div class="brand">
          RangeBooker
        </div>

        <h1>
          🏷 Yard Sale
        </h1>

        <div class="sub">
          Browse items listed by members. Listings and photos are loaded live from SharePoint through the RangeBooker API.
        </div>

      </div>

      <a class="backButton" href="/memberhome.html">
        ← Back Home
      </a>

    </div>

  </div>

  <div id="statusBox">
    Loading yard sale items...
  </div>

  <div id="yardSaleGrid" class="grid" style="display:none;"></div>

  <div class="footerNote">
    RangeBooker Yard Sale • Live SharePoint Listings
  </div>

</div>

<script>

function escapeHtml(value) {

  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatPrice(value) {

  if (value === null || value === undefined || value === "") {
    return "Best Offer";
  }

  const n = Number(value);

  if (isNaN(n)) {
    return escapeHtml(value);
  }

  return "$" + n.toLocaleString();
}

function formatDate(value) {

  if (!value) {
    return "";
  }

  const d = new Date(value);

  if (isNaN(d.getTime())) {
    return escapeHtml(value);
  }

  return d.toLocaleDateString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

async function loadYardSaleItems() {

  const statusBox = document.getElementById("statusBox");
  const grid = document.getElementById("yardSaleGrid");

  statusBox.style.display = "block";
  grid.style.display = "none";

  statusBox.innerHTML = "Loading yard sale items...";

  try {

    const response = await fetch("/api/GetYardSaleItems");

    if (!response.ok) {
      throw new Error("API returned " + response.status);
    }

    const data = await response.json();

    if (!data.success) {
      throw new Error(data.error || "Unknown API error");
    }

    const items = data.items || [];

    if (items.length === 0) {

      statusBox.innerHTML =
        "No yard sale items are currently listed.";

      return;
    }

    grid.innerHTML = "";

    items.forEach(item => {

      const card = document.createElement("div");
      card.className = "itemCard";

      const itemName =
        escapeHtml(
          item.itemName ||
          item.title ||
          "Untitled Item"
        );

      const description =
        escapeHtml(
          item.description ||
          "No description provided."
        );

      const price =
        formatPrice(item.askingPrice);

      const dateAdded =
        formatDate(item.dateAdded);

      const status =
        escapeHtml(item.status || "");

      const image =
        item.imageDataUrl || "";

      card.innerHTML = `

        <div class="photoWrap">

          ${
            image
              ? `
                <img
                  src="${image}"
                  alt="${itemName}">
              `
              : `
                <div>
                  No Photo Available
                </div>
              `
          }

        </div>

        <div class="cardBody">

          <div class="itemTitle">
            ${itemName}
          </div>

          <div class="price">
            ${price}
          </div>

          <div class="description">
            ${description}
          </div>

          <div class="meta">

            ${
              dateAdded
                ? `Listed: ${dateAdded}<br>`
                : ""
            }

            ${
              status
                ? `Status: ${status}`
                : ""
            }

          </div>

          <button
            class="bidButton"
            onclick="placeBid('${itemName.replaceAll("'", "\\'")}')">

            Place Bid

          </button>

        </div>
      `;

      grid.appendChild(card);

    });

    statusBox.style.display = "none";
    grid.style.display = "grid";

  }
  catch (err) {

    console.error(err);

    statusBox.innerHTML =
      "Could not load yard sale items:<br><br>" +
      escapeHtml(err.message);
  }
}

function placeBid(itemName) {

  alert(
    "Bid selected for:\n\n" +
    itemName +
    "\n\nBid/contact functionality can be connected next."
  );
}

document.addEventListener(
  "DOMContentLoaded",
  loadYardSaleItems
);

</script>

</body>
</html>
