<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Yard Sale</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #020617;
    color: white;
  }

  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 18px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
  }

  .back {
    color: white;
    background: #334155;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 10px;
    font-weight: bold;
  }

  h1 {
    margin: 0;
    font-size: 32px;
  }

  .sub {
    color: #cbd5e1;
    margin-bottom: 25px;
  }

  .status {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 20px;
    color: #cbd5e1;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  .item {
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.35);
  }

  .pic {
    width: 100%;
    height: 210px;
    background: linear-gradient(135deg, #1e293b, #475569);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #cbd5e1;
    font-size: 18px;
    text-align: center;
  }

  .pic img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .body {
    padding: 18px;
  }

  .title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .desc {
    color: #dbeafe;
    line-height: 1.4;
    min-height: 58px;
  }

  .meta {
    margin-top: 14px;
    font-size: 14px;
    color: #cbd5e1;
    line-height: 1.7;
  }

  .price {
    font-size: 20px;
    font-weight: bold;
    color: #facc15;
    margin-top: 12px;
  }

  button {
    width: 100%;
    margin-top: 16px;
    border: none;
    border-radius: 12px;
    padding: 14px;
    background: #16a34a;
    color: white;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    filter: brightness(1.15);
  }

  .note {
    margin-top: 30px;
    color: #94a3b8;
    text-align: center;
    font-size: 14px;
  }

  @media (max-width: 700px) {
    .topbar {
      flex-direction: column;
      align-items: flex-start;
    }

    h1 {
      font-size: 28px;
    }
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="topbar">
    <div>
      <h1>🏷 RangeBooker Yard Sale</h1>
      <div class="sub">
        Items listed by members. Check back often for new listings.
      </div>
    </div>

    <a class="back" href="/memberhome.html">
      ← Back Home
    </a>
  </div>

  <div id="yardSaleStatus" class="status">
    Loading yard sale items...
  </div>

  <div id="yardSaleGrid" class="grid" style="display:none;"></div>

  <div class="note">
    Yard sale items are loaded from SharePoint.
  </div>

</div>

<script>
const API_BASE = "https://rangebooker-api.azurewebsites.net/api";

function escapeHtml(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatPrice(value) {
  if (value === null || value === undefined || value === "") {
    return "Best Offer";
  }

  const numberValue = Number(value);

  if (isNaN(numberValue)) {
    return escapeHtml(value);
  }

  return "$" + numberValue.toLocaleString();
}

function formatDate(value) {
  if (!value) {
    return "";
  }

  const date = new Date(value);

  if (isNaN(date.getTime())) {
    return escapeHtml(value);
  }

  return date.toLocaleDateString("en-US", {
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

async function loadYardSaleItems() {
  const statusBox = document.getElementById("yardSaleStatus");
  const grid = document.getElementById("yardSaleGrid");

  statusBox.style.display = "block";
  grid.style.display = "none";
  statusBox.textContent = "Loading yard sale items...";

  try {
    const response = await fetch(`${API_BASE}/GetYardSaleItems`);
    const data = await response.json();

    if (!response.ok || !data.success) {
      throw new Error(data.error || "Unable to load yard sale items.");
    }

    if (!data.items || data.items.length === 0) {
      statusBox.textContent = "No yard sale items are listed yet.";
      return;
    }

    grid.innerHTML = "";

    data.items.forEach(item => {
      const card = document.createElement("div");
      card.className = "item";

      const itemName = escapeHtml(item.itemName || item.title || "Untitled Item");
      const description = escapeHtml(item.description || "");
      const price = formatPrice(item.askingPrice);
      const status = escapeHtml(item.status || "");
      const dateAdded = formatDate(item.dateAdded);
      const image = item.imageDataUrl || "";

      card.innerHTML = `
        <div class="pic">
          ${
            image
              ? `<img src="${image}" alt="${itemName}">`
              : `<div>No Photo</div>`
          }
        </div>

        <div class="body">
          <div class="title">${itemName}</div>

          <div class="desc">
            ${description || "No description provided."}
          </div>

          <div class="meta">
            ${dateAdded ? `Listed: ${dateAdded}<br>` : ""}
            ${status ? `Status: ${status}` : ""}
          </div>

          <div class="price">${price}</div>

          <button onclick="placeBid('${itemName.replaceAll("'", "\\'")}')">
            Place Bid
          </button>
        </div>
      `;

      grid.appendChild(card);
    });

    statusBox.style.display = "none";
    grid.style.display = "grid";

  } catch (err) {
    console.error(err);
    statusBox.textContent = "Could not load yard sale items: " + err.message;
  }
}

function placeBid(itemName) {
  alert(
    "Bid selected for: " +
    itemName +
    "\n\nBid/contact feature can be connected next."
  );
}

document.addEventListener("DOMContentLoaded", loadYardSaleItems);
</script>

</body>
</html>
