<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>My Stats</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 32%),
      linear-gradient(135deg, #020617 0%, #111827 55%, #0f172a 100%);
    margin: 0;
    padding: 24px;
    color: #e5e7eb;
    min-height: 100vh;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  .top-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .nav-button {
    display: inline-block;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  }

  .nav-button:hover {
    background: #1d4ed8;
  }

  .settings-button {
    background: #374151;
  }

  .settings-button:hover {
    background: #111827;
  }

  .card {
    background: rgba(15, 23, 42, 0.96);
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.36);
    border: 1px solid rgba(148, 163, 184, 0.14);
  }

  h1, h2 {
    margin-top: 0;
    margin-bottom: 16px;
    color: #f8fafc;
  }

  .profile-row {
    margin-bottom: 10px;
    font-size: 16px;
    color: #cbd5e1;
  }

  .label {
    font-weight: bold;
    color: #f8fafc;
  }

  .summary {
    color: #cbd5e1;
    margin-bottom: 16px;
  }

  .request {
    background: rgba(30, 41, 59, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .request-date {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 6px;
    color: #f8fafc;
  }

  .request-meta {
    font-size: 14px;
    color: #94a3b8;
    margin-top: 4px;
  }

  .status {
    display: inline-block;
    margin-top: 8px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
  }

  .requesting,
  .pending {
    background: rgba(217, 119, 6, 0.18);
    color: #fdba74;
  }

  .approved {
    background: rgba(22, 163, 74, 0.18);
    color: #86efac;
  }

  .denied,
  .rejected {
    background: rgba(220, 38, 38, 0.18);
    color: #fca5a5;
  }

  .message {
    color: #cbd5e1;
    background: rgba(30, 41, 59, 0.82);
    border: 1px solid rgba(148, 163, 184, 0.16);
    border-radius: 12px;
    padding: 16px;
  }

  .error {
    color: #fecaca;
    background: rgba(127, 29, 29, 0.55);
    border: 1px solid rgba(248, 113, 113, 0.35);
    padding: 14px;
    border-radius: 12px;
    white-space: pre-wrap;
  }
</style>
</head>

<body>

<div class="container">

  <div class="top-buttons">
    <a href="memberhome.html" class="nav-button">← Back to Home</a>
    <a href="mysettings.html" class="nav-button settings-button">⚙ My Settings</a>
  </div>

  <div class="card">
    <h1>My Stats</h1>

    <div class="profile-row">
      <span class="label">Name:</span>
      <span id="memberName">Loading...</span>
    </div>

    <div class="profile-row">
      <span class="label">Email:</span>
      <span id="memberEmail">Loading...</span>
    </div>

    <div class="profile-row">
      <span class="label">Member Since:</span>
      <span id="memberSince">Loading...</span>
    </div>

    <div class="profile-row">
      <span class="label">Last Login:</span>
      <span id="lastLogin">Loading...</span>
    </div>
  </div>

  <div class="card">
    <h2>My Requested Dates</h2>
    <div id="requestSummary" class="summary">Loading your requests...</div>
    <div id="myRequestList">Loading...</div>
  </div>

</div>

<script>
const savedUser = sessionStorage.getItem("rangebookerUser");

if (!savedUser) {
  window.location.href = "/login.html";
}

const user = JSON.parse(savedUser);

const memberId = user.id;
const email = user.email || "";

// ===== PROFILE INFO =====
document.getElementById("memberName").textContent =
  `${user.firstName || ""} ${user.lastName || ""}`.trim() || "Member";

document.getElementById("memberEmail").textContent = email;

document.getElementById("memberSince").textContent =
  formatDateWithDay(user.dateJoined || user.DateJoined);

document.getElementById("lastLogin").textContent =
  formatDateTime(user.lastLogin || user.LastLogin);

// ===== LOAD REQUESTS =====
async function loadRequests() {
  const listContainer = document.getElementById("myRequestList");
  const summaryContainer = document.getElementById("requestSummary");

  if (!memberId) {
    showError("Missing member ID from login session.");
    return;
  }

  const url = `/api/GetMyRequests?memberId=${encodeURIComponent(memberId)}`;

  try {
    const res = await fetch(url);

    if (!res.ok) {
      showError("API failed: " + res.status);
      return;
    }

    const data = await res.json();

    if (!data.success) {
      showError(data.error || "API returned failure.");
      return;
    }

    const requests = data.requests || [];

    if (requests.length === 0) {
      summaryContainer.textContent = "";
      listContainer.innerHTML =
        `<div class="message">You do not have any requested dates yet.</div>`;
      return;
    }

    summaryContainer.textContent =
      `You currently have ${requests.length} requested date${requests.length === 1 ? "" : "s"}.`;

    listContainer.innerHTML = requests.map(r => {
      const status = r.status || "Requesting";
      const statusClass = status.toLowerCase();

      return `
        <div class="request">
          <div class="request-date">${formatDateWithDay(r.requestedDate)}</div>
          <div class="status ${statusClass}">${status}</div>
          <div class="request-meta">
            Requested on ${formatDateTime(r.requestedAt)}
          </div>
        </div>
      `;
    }).join("");

  } catch (err) {
    showError("Could not load your requests.\n\n" + err.message);
  }
}

// ===== HELPERS =====
function showError(message) {
  document.getElementById("requestSummary").textContent = "";
  document.getElementById("myRequestList").innerHTML =
    `<div class="error">${message}</div>`;
}

function formatDateWithDay(value) {
  if (!value) return "—";

  const d = new Date(value);
  if (isNaN(d)) return value;

  return d.toLocaleDateString("en-US", {
    weekday: "long",
    month: "long",
    day: "numeric",
    year: "numeric"
  });
}

function formatDateTime(value) {
  if (!value) return "—";

  const d = new Date(value);
  if (isNaN(d)) return value;

  return d.toLocaleString("en-US", {
    weekday: "long",
    month: "numeric",
    day: "numeric",
    year: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

// ===== INIT =====
loadRequests();
</script>

</body>
</html>
