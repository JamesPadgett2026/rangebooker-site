<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>My Settings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(37, 99, 235, 0.22), transparent 32%),
      linear-gradient(135deg, #020617 0%, #111827 55%, #0f172a 100%);
    margin: 0;
    padding: 24px;
    color: #e5e7eb;
    min-height: 100vh;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
  }

  .top-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .nav-button {
    display: inline-block;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  }

  .nav-button:hover {
    background: #1d4ed8;
  }

  .card {
    background: rgba(15, 23, 42, 0.96);
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 10px 26px rgba(0,0,0,0.36);
    border: 1px solid rgba(148, 163, 184, 0.14);
  }

  h1, h2 {
    margin-top: 0;
    color: #f8fafc;
  }

  label {
    display: block;
    font-weight: bold;
    margin-top: 14px;
    margin-bottom: 6px;
    color: #f8fafc;
  }

  input {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    font-size: 16px;
    border: 1px solid rgba(148, 163, 184, 0.35);
    border-radius: 10px;
    background: rgba(30, 41, 59, 0.95);
    color: #e5e7eb;
  }

  input::placeholder {
    color: #94a3b8;
  }

  button {
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    font-size: 16px;
    font-weight: bold;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(0,0,0,0.35);
  }

  button:hover {
    background: #15803d;
  }

  button:disabled {
    background: #6b7280;
    cursor: not-allowed;
  }

  .secondary-button {
    background: #374151;
  }

  .secondary-button:hover {
    background: #111827;
  }

  .danger-button {
    background: #dc2626;
  }

  .danger-button:hover {
    background: #b91c1c;
  }

  .message {
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    display: none;
    white-space: pre-wrap;
  }

  .success {
    background: rgba(22, 163, 74, 0.18);
    color: #86efac;
    border: 1px solid rgba(134, 239, 172, 0.35);
  }

  .error {
    background: rgba(127, 29, 29, 0.55);
    color: #fecaca;
    border: 1px solid rgba(248, 113, 113, 0.35);
  }

  .hint {
    color: #cbd5e1;
    font-size: 14px;
    margin-top: 8px;
  }

  .hidden {
    display: none;
  }
</style>
</head>

<body>

<div class="container">

  <div class="top-buttons">
    <a href="memberhome.html" class="nav-button">← Back to Home</a>
    <a href="mystats.html" class="nav-button">My Stats</a>
  </div>

  <div class="card">
    <h1>My Settings</h1>

    <h2>Password</h2>

    <p class="hint">
      For security, you will need to enter your current password before changing it.
    </p>

    <button id="showPasswordButton" class="secondary-button" onclick="showPasswordCard()">
      Change Password
    </button>

    <div id="passwordFields" class="hidden">

      <label for="currentPassword">Current Password</label>
      <input id="currentPassword" type="password" placeholder="Enter current password" />

      <label for="newPassword">New Password</label>
      <input id="newPassword" type="password" placeholder="Enter new password" />

      <label for="confirmPassword">Confirm New Password</label>
      <input id="confirmPassword" type="password" placeholder="Confirm new password" />

      <button id="savePasswordButton" onclick="savePassword()">Save New Password</button>

      <button class="danger-button" onclick="hidePasswordCard()">Cancel</button>

    </div>

    <div id="passwordMessageBox" class="message"></div>
  </div>

</div>

<script>
const savedUser = sessionStorage.getItem("rangebookerUser");

if (!savedUser) {
  window.location.href = "/login.html";
}

const user = JSON.parse(savedUser);
const memberId = user.id;

function showPasswordCard() {
  document.getElementById("passwordFields").classList.remove("hidden");
  document.getElementById("showPasswordButton").classList.add("hidden");
  hideMessage("passwordMessageBox");
}

function hidePasswordCard() {
  document.getElementById("passwordFields").classList.add("hidden");
  document.getElementById("showPasswordButton").classList.remove("hidden");

  document.getElementById("currentPassword").value = "";
  document.getElementById("newPassword").value = "";
  document.getElementById("confirmPassword").value = "";

  hideMessage("passwordMessageBox");
}

async function savePassword() {
  const saveButton = document.getElementById("savePasswordButton");

  const currentPassword =
    document.getElementById("currentPassword").value.trim();

  const newPassword =
    document.getElementById("newPassword").value.trim();

  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  hideMessage("passwordMessageBox");

  if (!memberId) {
    showMessage("passwordMessageBox", "Missing member ID. Please log out and log back in.", "error");
    return;
  }

  if (!currentPassword) {
    showMessage("passwordMessageBox", "Please enter your current password.", "error");
    return;
  }

  if (newPassword.length < 6) {
    showMessage("passwordMessageBox", "New password should be at least 6 characters.", "error");
    return;
  }

  if (newPassword !== confirmPassword) {
    showMessage("passwordMessageBox", "The new passwords do not match.", "error");
    return;
  }

  if (currentPassword === newPassword) {
    showMessage("passwordMessageBox", "The new password must be different from the current password.", "error");
    return;
  }

  saveButton.disabled = true;
  saveButton.textContent = "Saving...";

  try {
    const res = await fetch("/api/UpdateMySettings", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        memberId: memberId,
        currentPassword: currentPassword,
        newPassword: newPassword
      })
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      showMessage("passwordMessageBox", data.error || "Password update failed.", "error");
      return;
    }

    showMessage("passwordMessageBox", "Password changed successfully.", "success");
    hidePasswordCard();

  } catch (err) {
    showMessage("passwordMessageBox", "Could not change password.\n\n" + err.message, "error");
  } finally {
    saveButton.disabled = false;
    saveButton.textContent = "Save New Password";
  }
}

function showMessage(boxId, message, type) {
  const box = document.getElementById(boxId);
  box.textContent = message;
  box.className = "message " + type;
  box.style.display = "block";
}

function hideMessage(boxId) {
  const box = document.getElementById(boxId);
  box.style.display = "none";
}
</script>

</body>
</html>
