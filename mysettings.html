<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>My Settings</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 24px;
    color: #1f2937;
  }

  .container {
    max-width: 620px;
    margin: 0 auto;
  }

  .top-buttons {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .nav-button {
    display: inline-block;
    padding: 10px 16px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    font-size: 14px;
  }

  .nav-button:hover {
    background: #1d4ed8;
  }

  .card {
    background: white;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  h1, h2 {
    margin-top: 0;
  }

  label {
    display: block;
    font-weight: bold;
    margin-top: 14px;
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
  }

  button {
    width: 100%;
    margin-top: 18px;
    padding: 13px;
    font-size: 16px;
    font-weight: bold;
    background: #16a34a;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  button:hover {
    background: #15803d;
  }

  button:disabled {
    background: #9ca3af;
    cursor: not-allowed;
  }

  .message {
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    display: none;
    white-space: pre-wrap;
  }

  .success {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
  }

  .error {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fecaca;
  }

  .hint {
    color: #6b7280;
    font-size: 14px;
    margin-top: 8px;
  }
</style>
</head>

<body>

<div class="container">

  <div class="top-buttons">
    <a href="memberhome.html" class="nav-button">← Back to Home</a>
    <a href="mystats.html" class="nav-button">My Stats</a>
  </div>

  <div class="card">
    <h1>My Settings</h1>

    <p class="hint">
      Update your password or preferred contact method.
    </p>

    <label for="preferredContact">Preferred Contact Method</label>
    <select id="preferredContact">
      <option value="">Select one...</option>
      <option value="Text">Text</option>
      <option value="Email">Email</option>
      <option value="None">None</option>
    </select>

    <hr style="margin:24px 0; border:none; border-top:1px solid #e5e7eb;">

    <h2>Change Password</h2>

    <label for="newPassword">New Password</label>
    <input id="newPassword" type="password" placeholder="Enter new password" />

    <label for="confirmPassword">Confirm New Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm new password" />

    <button id="saveButton" onclick="saveSettings()">Save Settings</button>

    <div id="messageBox" class="message"></div>
  </div>

</div>

<script>
const savedUser = sessionStorage.getItem("rangebookerUser");

if (!savedUser) {
  window.location.href = "/login.html";
}

const user = JSON.parse(savedUser);

const memberId = user.id;
const email = user.email || "";

document.getElementById("preferredContact").value =
  user.preferredContactChoice ||
  user.PreferredContactChoice ||
  "";

async function saveSettings() {
  const saveButton = document.getElementById("saveButton");
  const preferredContact = document.getElementById("preferredContact").value;
  const newPassword = document.getElementById("newPassword").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  hideMessage();

  if (!memberId) {
    showMessage("Missing member ID. Please log out and log back in.", "error");
    return;
  }

  if (!preferredContact) {
    showMessage("Please choose a preferred contact method.", "error");
    return;
  }

  if (newPassword || confirmPassword) {
    if (newPassword.length < 6) {
      showMessage("Password should be at least 6 characters.", "error");
      return;
    }

    if (newPassword !== confirmPassword) {
      showMessage("The passwords do not match.", "error");
      return;
    }
  }

  saveButton.disabled = true;
  saveButton.textContent = "Saving...";

  try {
    const body = {
      memberId: memberId,
      preferredContactChoice: preferredContact
    };

    if (newPassword) {
      body.newPassword = newPassword;
    }

    const res = await fetch("/api/UpdateMySettings", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(body)
    });

    const data = await res.json();

    if (!res.ok || !data.success) {
      showMessage(data.error || "Settings update failed.", "error");
      return;
    }

    user.preferredContactChoice = preferredContact;
    user.PreferredContactChoice = preferredContact;

    sessionStorage.setItem("rangebookerUser", JSON.stringify(user));

    document.getElementById("newPassword").value = "";
    document.getElementById("confirmPassword").value = "";

    showMessage("Settings saved successfully.", "success");

  } catch (err) {
    showMessage("Could not save settings.\n\n" + err.message, "error");
  } finally {
    saveButton.disabled = false;
    saveButton.textContent = "Save Settings";
  }
}

function showMessage(message, type) {
  const box = document.getElementById("messageBox");
  box.textContent = message;
  box.className = "message " + type;
  box.style.display = "block";
}

function hideMessage() {
  const box = document.getElementById("messageBox");
  box.style.display = "none";
}
</script>

</body>
</html>
