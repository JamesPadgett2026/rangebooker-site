<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Member Home</title>

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
      linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
      url("https://images.unsplash.com/photo-1548438294-1ad5d5f4f063?auto=format&fit=crop&w=1400&q=80")
      center/cover no-repeat;
    min-height: 100vh;
    color: white;
  }

  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .card {
    background: rgba(15, 23, 42, 0.9);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .title {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .sub {
    color: #cbd5f5;
    margin-bottom: 24px;
  }

  h1 {
    margin: 0 0 10px 0;
    font-size: 24px;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .btn {
    display: block;
    text-decoration: none;
    background: #2563eb;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    color: white;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  .btn.secondary {
    background: #16a34a;
  }

  .btn.logout {
    background: #dc2626;
  }

  .footer {
    margin-top: 30px;
    text-align: right;
  }

  @media (max-width: 600px) {
    .wrap { padding: 20px; }
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="title">🎯 RangeBooker</div>

    <h1 id="welcome"></h1>
    <div class="sub">Manage your range access, view availability, and track your activity.</div>

    <div class="actions">
      <!-- FIXED calendar link -->
      <a class="btn" href="/calendar.html">📅 View Calendar</a>

      <!-- NEW stats button -->
      <a class="btn secondary" href="/mystats.html">📊 My Stats</a>
    </div>

    <div class="footer">
      <a class="btn logout" href="#" onclick="logout()">Logout</a>
    </div>

  </div>
</div>

<script>
const user = sessionStorage.getItem("rangebookerUser");

if (!user) {
  window.location.href = "login.html";
}

const parsed = JSON.parse(user);

document.getElementById("welcome").innerText =
  "Welcome " + (parsed.firstName || "") + " " + (parsed.lastName || "");

function logout() {
  sessionStorage.removeItem("rangebookerUser");
  window.location.href = "login.html";
}
</script>

</body>
</html>
