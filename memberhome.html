<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Member Home</title>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --bullet-menu-photo: none;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    min-height: 100vh;
    color: white;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .card {
    background: rgba(15, 23, 42, 0.92);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .member-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 28px;
    align-items: stretch;
  }

  .left-photo-box {
    background: rgba(0,0,0,0.35);
    border-radius: 14px;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .left-photo-box img {
    width: 100%;
    height: 100%;
    min-height: 360px;
    object-fit: cover;
    display: none;
  }

  .photo-loading {
    color: #cbd5f5;
    padding: 20px;
    text-align: center;
    font-size: 14px;
  }

  .title {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .sub {
    color: #cbd5f5;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  h1 {
    margin: 0 0 10px 0;
    font-size: 24px;
  }

  .actions {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 78px;
    text-decoration: none;
    background-color: #111827;
    background-image: var(--bullet-menu-photo);
    background-size: cover;
    background-position: center;
    padding: 16px 24px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    font-size: 20px;
    color: white;
    text-shadow: 0 2px 6px #000, 0 0 14px #000;
    border: 1px solid rgba(255,255,255,0.15);
    transition:
      transform 0.15s,
      box-shadow 0.15s,
      filter 0.15s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    filter: brightness(1.15);
  }

  .btn.logout {
    min-height: 70px;
    background-image: var(--bullet-menu-photo);
    background-size: cover;
    background-position: center;
    background-color: #dc2626;
    font-size: 18px;
    transform: scaleX(-1);
  }

  .btn.logout span {
    display: inline-block;
    transform: scaleX(-1);
  }

  .btn.logout:hover {
    filter: brightness(1.15);
  }

  .footer {
    margin-top: 30px;
    text-align: right;
  }

  @media (max-width: 800px) {
    .member-layout {
      grid-template-columns: 1fr;
    }

    .left-photo-box {
      min-height: 240px;
    }

    .left-photo-box img {
      min-height: 240px;
    }
  }

  @media (max-width: 600px) {
    .wrap {
      padding: 20px;
    }

    .card {
      padding: 20px;
    }

    .btn {
      font-size: 17px;
      min-height: 70px;
    }
  }
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="member-layout">

      <div class="left-photo-box">
        <div id="photoLoading" class="photo-loading">
          Loading photo...
        </div>

        <img
          id="memberHomeLeftPhoto"
          alt="Member Home Photo"
        />
      </div>

      <div>

        <div class="title">
          🎯 RangeBooker
        </div>

        <h1 id="welcome"></h1>

        <div class="sub">
          Manage your range access,
          view availability,
          and track your activity.
        </div>

        <div class="actions">

          <a class="btn" href="/RulesReminder.html">
            📅 View Calendar
          </a>

          <a class="btn" href="/mystats.html">
            📊 My Stats
          </a>

          <a class="btn" href="/bulletinboard.html">
            📌 Bullet-Tin Board
          </a>

          <a class="btn" href="/yardsale.html">
            🏷 Yard Sale
          </a>

          <a class="btn" href="/mysettings.html">
            ⚙ My Settings
          </a>

        </div>

        <div class="footer">
          <a class="btn logout" href="#" onclick="logout(); return false;">
            <span>Logout</span>
          </a>
        </div>

      </div>

    </div>

  </div>
</div>

<script>
const user = sessionStorage.getItem("rangebookerUser");

if (!user) {
  window.location.href = "/login.html";
}

const parsed = JSON.parse(user);

if (
  String(parsed.rulesAcknowledged || "")
    .trim()
    .toLowerCase() !== "yes"
) {
  window.location.href = "/RulesAndRegulations.html";
}

document.getElementById("welcome").innerText =
  "Welcome " +
  (parsed.firstName || "") +
  " " +
  (parsed.lastName || "");

async function getWebsitePhotos() {
  const response = await fetch("/api/GetWebsitePhotos");
  const data = await response.json();

  if (!data.success || !Array.isArray(data.photos)) {
    return [];
  }

  return data.photos;
}

function findPhotoByName(photos, photoName) {
  const wanted = String(photoName || "")
    .trim()
    .toLowerCase();

  return photos.find(p =>
    String(p.title || p.photoName || "")
      .trim()
      .toLowerCase() === wanted
  );
}

async function loadPagePhotos() {
  const img = document.getElementById("memberHomeLeftPhoto");
  const loading = document.getElementById("photoLoading");

  try {
    const photos = await getWebsitePhotos();

    const leftPhoto = findPhotoByName(
      photos,
      "MemberHomeLeftSide"
    );

    if (leftPhoto && leftPhoto.image) {
      img.src = leftPhoto.image;
      img.style.display = "block";
      loading.style.display = "none";
    } else {
      loading.innerText = "Photo not found";
    }

    const bulletPhoto = findPhotoByName(
      photos,
      "BulletMenuPhoto"
    );

    if (bulletPhoto && bulletPhoto.image) {
      document.documentElement.style.setProperty(
        "--bullet-menu-photo",
        `url("${bulletPhoto.image}")`
      );
    }

  } catch (err) {
    console.error("Photo load failed:", err);
    loading.innerText = "Photo unavailable";
  }
}

function logout() {
  sessionStorage.removeItem("rangebookerUser");
  window.location.href = "/login.html";
}

loadPagePhotos();
</script>

</body>
</html>
```
