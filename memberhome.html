<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RangeBooker - Member Home</title>

<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    min-height: 100vh;
    color: white;
  }

  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .card {
    background: rgba(15, 23, 42, 0.92);
    border-radius: 16px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .member-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 28px;
    align-items: stretch;
  }

  .left-photo-box {
    background: rgba(0,0,0,0.35);
    border-radius: 14px;
    overflow: hidden;
    min-height: 360px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .left-photo-box img {
    width: 100%;
    height: 100%;
    min-height: 360px;
    object-fit: cover;
    display: none;
  }

  .photo-loading {
    color: #cbd5f5;
    padding: 20px;
    text-align: center;
    font-size: 14px;
  }

  .title {
    font-size: 34px;
    font-weight: bold;
    margin-bottom: 6px;
  }

  .sub {
    color: #cbd5f5;
    margin-bottom: 24px;
    line-height: 1.5;
  }

  h1 {
    margin: 0 0 10px 0;
    font-size: 24px;
  }

  .actions {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-top: 20px;
  }

  .btn {
    display: block;
    text-decoration: none;
    background: #2563eb;
    padding: 16px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    color: white;
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.4);
  }

  .btn.secondary {
    background: #16a34a;
  }

  .btn.secondary:hover {
    background: #15803d;
  }

  .btn.orange {
    background: #ea580c;
  }

  .btn.orange:hover {
    background: #c2410c;
  }

  .btn.purple {
    background: #7c3aed;
  }

  .btn.purple:hover {
    background: #6d28d9;
  }

  .btn.logout {
    background: #dc2626;
  }

  .btn.logout:hover {
    background: #b91c1c;
  }

  .footer {
    margin-top: 30px;
    text-align: right;
  }

  @media (max-width: 800px) {
    .member-layout {
      grid-template-columns: 1fr;
    }

    .left-photo-box {
      min-height: 240px;
    }

    .left-photo-box img {
      min-height: 240px;
    }
  }

  @media (max-width: 600px) {
    .wrap {
      padding: 20px;
    }

    .card {
      padding: 20px;
    }
  }
</style>
</head>

<body>

<div class="wrap">

  <div class="card">

    <div class="member-layout">

      <!-- LEFT SIDE PHOTO -->
      <div class="left-photo-box">

        <div id="photoLoading" class="photo-loading">
          Loading photo...
        </div>

        <img
          id="memberHomeLeftPhoto"
          alt="Member Home Photo"
        />

      </div>

      <!-- RIGHT SIDE CONTENT -->
      <div>

        <div class="title">
          🎯 RangeBooker
        </div>

        <h1 id="welcome"></h1>

        <div class="sub">
          Manage your range access, view availability,
          and track your activity.
        </div>

        <div class="actions">

          <!-- CALENDAR -->
          <a class="btn" href="/calendar.html">
            📅 View Calendar
          </a>

          <!-- MY STATS -->
          <a class="btn secondary" href="/mystats.html">
            📊 My Stats
          </a>

          <!-- BULLETIN BOARD -->
          <a class="btn orange" href="/bulletinboard.html">
            📌 Bullet-Tin Board
          </a>

          <!-- SETTINGS -->
          <a class="btn purple" href="/mysettings.html">
            ⚙ My Settings
          </a>

        </div>

        <div class="footer">

          <a
            class="btn logout"
            href="#"
            onclick="logout()"
          >
            Logout
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

const user = sessionStorage.getItem("rangebookerUser");

if (!user) {
  window.location.href = "login.html";
}

const parsed = JSON.parse(user);

document.getElementById("welcome").innerText =
  "Welcome " +
  (parsed.firstName || "") +
  " " +
  (parsed.lastName || "");

async function loadMemberHomeLeftPhoto() {

  const img = document.getElementById("memberHomeLeftPhoto");
  const loading = document.getElementById("photoLoading");

  try {

    const response = await fetch("/api/GetWebsitePhotos");

    const data = await response.json();

    if (!data.success || !Array.isArray(data.photos)) {

      loading.innerText = "Photo unavailable";

      return;
    }

    const photo = data.photos.find(p =>
      String(p.title || "")
        .trim()
        .toLowerCase() === "memberhomeleftside"
    );

    if (!photo || !photo.image) {

      loading.innerText = "Photo not found";

      return;
    }

    img.src = photo.image;

    img.style.display = "block";

    loading.style.display = "none";

  }
  catch (err) {

    console.error("Photo load failed:", err);

    loading.innerText = "Photo unavailable";
  }
}

function logout() {

  sessionStorage.removeItem("rangebookerUser");

  window.location.href = "login.html";
}

loadMemberHomeLeftPhoto();

</script>

</body>
</html>
