<script>
document.addEventListener("DOMContentLoaded", function () {

  const savedUser = sessionStorage.getItem("rangebookerUser");

  if (!savedUser) {
    window.location.href = "/login.html";
    return;
  }

  const user = JSON.parse(savedUser);
  const params = new URLSearchParams(window.location.search);

  const rawDate = params.get("date") || "";
  const start = params.get("start") || "";
  const end = params.get("end") || "";
  const status = params.get("status") || "";
  const dateId = params.get("id") || params.get("dateId") || "";

  const memberName =
    ((user.firstName || "") + " " + (user.lastName || "")).trim();

  document.getElementById("memberName").textContent = memberName;
  document.getElementById("memberEmail").textContent = user.email || "";

  // ✅ FULL DATE + TIME (matches PowerApps)
  function formatDateTime(value) {
    if (!value) return "";

    const d = new Date(value);

    if (isNaN(d.getTime())) return value;

    return d.toLocaleString("en-US", {
      month: "numeric",
      day: "numeric",
      year: "numeric",
      hour: "numeric",
      minute: "2-digit",
      hour12: true
    });
  }

  // ✅ NICE DISPLAY (long format)
  function formatDateNice(value) {
    if (!value) return "";

    const d = new Date(value);

    if (isNaN(d.getTime())) return value;

    return d.toLocaleDateString("en-US", {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric"
    });
  }

  // ✅ DISPLAY
  document.getElementById("selectedDate").textContent = formatDateNice(rawDate);
  document.getElementById("selectedStart").textContent = start;
  document.getElementById("selectedEnd").textContent = end;
  document.getElementById("selectedStatus").textContent = status;

  function showMessage(text, type) {
    const message = document.getElementById("message");
    message.textContent = text;
    message.className = "message " + type;
  }

  // IMPORTANT: expose globally for button click
  window.submitBookingRequest = async function () {
    const submitBtn = document.getElementById("submitBtn");
    const notes = document.getElementById("notes").value.trim();

    if (!rawDate || !dateId) {
      showMessage(
        "Missing date information. Please go back to the calendar and select the date again.",
        "error"
      );
      return;
    }

    const parsedDate = new Date(rawDate);

    if (isNaN(parsedDate.getTime())) {
      showMessage("Invalid date: " + rawDate, "error");
      return;
    }

    // ✅ ALWAYS SEND ISO (this is the BIG FIX)
    const isoDate = parsedDate.toISOString();

    const payload = {
      memberId: Number(user.id),
      userLevel: Number(user.memberType || 1),
      memberName: memberName,
      dateActual: isoDate,
      dateId: Number(dateId),
      notes: notes
    };

    submitBtn.disabled = true;
    submitBtn.textContent = "Submitting...";
    showMessage("Submitting request...", "info");

    try {
      const response = await fetch("/api/RequestBooking", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok || !data.success) {
        showMessage(data.error || "Could not submit booking request.", "error");
        return;
      }

      showMessage("Booking request submitted successfully.", "success");

      setTimeout(() => {
        window.location.href = "/calendar.html";
      }, 1200);

    } catch (err) {
      showMessage("Server error: " + err.message, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Request";
    }
  };

});
</script>
